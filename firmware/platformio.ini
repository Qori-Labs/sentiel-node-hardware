; sentinel-node-hardware/firmware/platformio.ini
; Scaffold determinista para bring-up. Este repo no incluye firmware de producción.

[platformio]
default_envs = rak4631

[env]
platform = nordicnrf52@10.6.0
framework = arduino
monitor_speed = 115200

; Se prefiere RadioLib para radios clase SX126x (incluye SX1262).
; Otras librerías LoRa se omiten intencionalmente hasta publicar firmware real.
lib_deps =
  jgromes/RadioLib@7.1.0

build_flags =
  -D SERIAL_BAUD=115200

[env:rak4631]
; El soporte de la placa depende del paquete de boards de PlatformIO.
; Si "rak4631" no está disponible en tu entorno, añade una definición custom
; o cambia a una placa compatible con nRF52840 solo para compilación.
board = rak4631
